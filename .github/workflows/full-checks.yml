name: Full Checks

on:
  workflow_dispatch:

jobs:
  all-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout helper-scripts
        uses: actions/checkout@v4
        with:
          path: my-dashboard-backend/helper-scripts

      - name: Checkout auth-service
        uses: actions/checkout@v4
        with:
          repository: dlange97/auth-service
          path: my-dashboard-backend/auth-service

      - name: Checkout dashboard-service
        uses: actions/checkout@v4
        with:
          repository: dlange97/dashboard-service
          path: my-dashboard-backend/dashboard-service

      - name: Checkout events-service
        uses: actions/checkout@v4
        with:
          repository: dlange97/events-service
          path: my-dashboard-backend/events-service

      - name: Checkout notification-service
        uses: actions/checkout@v4
        with:
          repository: dlange97/notification-service
          path: my-dashboard-backend/notification-service

      - name: Checkout shared-bundle
        uses: actions/checkout@v4
        with:
          repository: dlange97/shared-bundle
          path: my-dashboard-backend/shared-bundle

      - name: Checkout translation-service
        uses: actions/checkout@v4
        with:
          repository: dlange97/translation-service
          path: my-dashboard-backend/translation-service

      - name: Checkout docker stack
        uses: actions/checkout@v4
        with:
          repository: dlange97/my-dashboard-docker
          path: my-dashboard-docker

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: dlange97/my-dashboard-frontend
          path: my-dashboard-frontend

      - name: Prepare Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm --prefix ./my-dashboard-frontend ci

      - name: Run full check suite
        run: bash ./my-dashboard-backend/helper-scripts/run-all-checks.sh
